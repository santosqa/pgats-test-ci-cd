  <!-- Wheels -->
  <circle cx="115" cy="260" r="12" fill="#9b6bff" opacity="0.7"/>
  <circle cx="185" cy="260" r="12" fill="#9b6bff" opacity="0.7"/>
  <!-- Arms -->
  <rect x="85" y="140" width="20" height="60" rx="4" fill="#cabfe3" opacity="0.9"/>
  <rect x="195" y="140" width="20" height="60" rx="4" fill="#cabfe3" opacity="0.9"/>
  <!-- Shadow -->
  <ellipse cx="150" cy="285" rx="60" ry="8" fill="#000" opacity="0.1"/>
</svg>
