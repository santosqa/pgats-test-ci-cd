<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b6bff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#7b39ff;stop-opacity:0.1" />
