# ──────────────────────────────────────────────────────────────────────────────
# Deploy — GitHub Pages
#
# Fluxo: testes (workflow_call) -> build -> deploy -> notify (e-mail único)
#
# - Se os testes falharem, build e deploy são "skipped" automaticamente
#   (needs + condições padrão do GitHub Actions).
# - O job "notify" sempre executa (if: always()) e envia UM ÚNICO e-mail
#   com o resumo de todos os jobs anteriores.
# ──────────────────────────────────────────────────────────────────────────────

name: 🚀 Deploy — GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  checks: write
  pull-requests: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── Job 1: Testes (reutiliza testes-automatizados.yml) ───────────────────
  test:
    name: 🧪 Testes
    uses: ./.github/workflows/testes-automatizados.yml
    with:
      debug: false
    secrets: inherit

  # ── Job 2: Build ──────────────────────────────────────────────────────────
  build:
    name: 🔨 Build do site
    runs-on: ubuntu-latest
    needs: test
    if: needs.test.outputs.overall_result == 'success'
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📂 Gerar catálogo de produtos
        run: python3 scripts/build_catalog.py

      - name: 🗂️ Preparar site estático
        run: |
          mkdir -p site
          cp -R index.html styles.css app.js catalog.json products logos site/

      - name: ⚙️ Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📤 Upload artefato Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # ── Job 3: Deploy ─────────────────────────────────────────────────────────
  deploy:
    name: 🌐 Publicar no GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Job 4: Notificação por e-mail (único, consolidado) ──────────────────────
  notify:
    name: 📧 Notificar resultado (e-mail único)
    runs-on: ubuntu-latest
    needs: [test, build, deploy]
    if: always()
    steps:
      - name: 📊 Montar resumo
        env:
          TEST_RESULT: ${{ needs.test.outputs.overall_result || needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
          REPOSITORY: ${{ github.repository }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          SERVER_URL: ${{ github.server_url }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
        run: |
          if [ "$TEST_RESULT" = "✅ success" ] && [ "$BUILD_RESULT" = "✅ success" ] && [ "$DEPLOY_RESULT" = "✅ success" ]; then
            OVERALL_STATUS="PASSOU ✅"
            OVERALL_ICON="✅"
          else
            OVERALL_STATUS="FALHOU ❌"
            OVERALL_ICON="❌"
          fi

          RECIPIENT="$NOTIFICATION_EMAIL"
          if [ -z "$RECIPIENT" ]; then
            RECIPIENT=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/users/$REPOSITORY_OWNER" | \
              python3 -c "import sys, json; print(json.load(sys.stdin).get('email') or '')")
          fi

          PAGE_URL_TXT="${PAGE_URL:-Não publicada nesta execução.}"
          RUN_URL="$SERVER_URL/$REPOSITORY/actions/runs/$RUN_ID"
          COMMIT_SHORT="${COMMIT_SHA:0:7}"
          SUBJECT="${OVERALL_ICON} Deploy GitHub Pages - $REPOSITORY #$RUN_NUMBER - $TEST_RESULT/$BUILD_RESULT/$DEPLOY_RESULT"

          # Exporta tudo de uma vez para o próximo step
          echo "OVERALL_STATUS=$OVERALL_STATUS"   >> "$GITHUB_ENV"
          echo "OVERALL_ICON=$OVERALL_ICON"        >> "$GITHUB_ENV"
          echo "RECIPIENT=$RECIPIENT"              >> "$GITHUB_ENV"
          echo "EMAIL_SUBJECT=$SUBJECT"            >> "$GITHUB_ENV"
          echo "PAGE_URL_TXT=$PAGE_URL_TXT"        >> "$GITHUB_ENV"
          echo "RUN_URL=$RUN_URL"                  >> "$GITHUB_ENV"
          echo "COMMIT_SHORT=$COMMIT_SHORT"        >> "$GITHUB_ENV"

          # Corpo (multiline)
          {
            echo "EMAIL_BODY<<EOF"
            echo "Status geral: $OVERALL_STATUS"
            echo ""
            echo "Repositório: $REPOSITORY"
            echo "Execução: #$RUN_NUMBER"
            echo "Trigger: $EVENT_NAME"
            echo "Branch: $REF_NAME"
            echo "Commit: $COMMIT_SHORT"
            echo ""
            echo "Resultado dos jobs:"
            echo "  - Testes (unitários + funcionais): $TEST_RESULT"
            echo "  - Build do site: $BUILD_RESULT"
            echo "  - Deploy GitHub Pages: $DEPLOY_RESULT"
            echo ""
            echo "URL publicada: $PAGE_URL_TXT"
            echo ""
            echo "Relatório completo da execução:"
            echo "$RUN_URL"
            echo "EOF"
          } >> "$GITHUB_ENV"

          # Step Summary
          {
            echo "## ${OVERALL_ICON} Resumo do Pipeline de Deploy"
            echo ""
            echo "| Job | Resultado |"
            echo "|-----|-----------|"
            echo "| Testes | $TEST_RESULT |"
            echo "| Build | $BUILD_RESULT |"
            echo "| Deploy | $DEPLOY_RESULT |"
            echo ""
            echo "URL publicada: $PAGE_URL_TXT"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 📧 Enviar e-mail via Python smtplib
        if: env.RECIPIENT != ''
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_FROM: ${{ secrets.NOTIFICATION_FROM }}
        run: |
          python3 - <<'PYEOF'
          import os, smtplib
          from email.mime.text import MIMEText

          host     = os.environ["SMTP_HOST"]
          port     = int(os.environ["SMTP_PORT"])
          user     = os.environ["SMTP_USERNAME"]
          password = os.environ["SMTP_PASSWORD"]
          from_    = os.environ["NOTIFY_FROM"]
          to_      = os.environ["RECIPIENT"]
          subject  = os.environ["EMAIL_SUBJECT"]
          body     = os.environ["EMAIL_BODY"]

          msg = MIMEText(body, "plain", "utf-8")
          msg["Subject"] = subject
          msg["From"]    = from_
          msg["To"]      = to_

          with smtplib.SMTP(host, port) as smtp:
              smtp.ehlo()
              smtp.starttls()
              smtp.login(user, password)
              smtp.sendmail(from_, [to_], msg.as_string())

          print(f"✅ E-mail enviado para {to_}")
          PYEOF

      - name: ⚠️ Aviso — e-mail não enviado
        if: env.RECIPIENT == ''
        run: |
          echo "::warning::E-mail não enviado: configure o secret NOTIFICATION_EMAIL."
          echo "## ⚠️ Email não enviado" >> "$GITHUB_STEP_SUMMARY"
          echo "Defina o secret NOTIFICATION_EMAIL para garantir o envio." >> "$GITHUB_STEP_SUMMARY"
