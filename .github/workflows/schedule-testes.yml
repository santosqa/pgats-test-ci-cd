name: 🕘 Schedule - Testes Automatizados

on:
  workflow_dispatch:

  schedule:
    #Roda a cada 30 minutos
    - cron: '*/30 * * * *'

    #Roda toda sexta-feira à meia noite
    - cron: '0 0 * * 5'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  run-tests:
    name: 🧪 Executar suíte de testes (agendado)
    uses: ./.github/workflows/testes-automatizados.yml
    with:
      debug: false
    secrets: inherit

  debug:
    name: 🔍 Depuração
    runs-on: ubuntu-latest
    needs: run-tests
    if: always()
    steps:
      - name: Imprimir resultado
        run: |
          echo "Horário de execução: $(date -u)"
          echo "Resultado dos testes: ${{ needs.run-tests.result }}"