# ──────────────────────────────────────────────────────────────────────────────
# Pipeline de Deploy — GitHub Pages
#
# Executa somente após os testes passarem (via needs: test).
# Publicação ocorre apenas para pushes em main ou disparo manual.
# ──────────────────────────────────────────────────────────────────────────────

name: 🚀 Deploy — GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── Job 1: Testes ─────────────────────────────────────────────────────────
  test:
    name: ✅ Testes de validação
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v6

      - name: 🟢 Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm install

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 📂 Gerar catálogo de produtos
        run: npm run build:catalog

      - name: 🧪 Executar testes unitários
        id: unit_tests
        continue-on-error: true
        run: |
          mkdir -p reports
          npm run test:unit:ci -- --runInBand
        env:
          JEST_JUNIT_OUTPUT_DIR: '.'
          JEST_JUNIT_OUTPUT_NAME: 'junit.xml'

      - name: 🎭 Instalar navegadores do Playwright
        id: playwright_install
        continue-on-error: true
        run: npx playwright install --with-deps chromium

      - name: 🎭 Executar testes funcionais
        id: functional_tests
        if: always()
        continue-on-error: true
        run: |
          if [ "${{ steps.playwright_install.outcome }}" != "success" ]; then
            echo "Instalação do Playwright falhou; marcando testes funcionais como falha para manter relatório e artefatos."
            exit 1
          fi
          npm run test:functional

      - name: 📊 Resumo dos testes de deploy
        if: always()
        env:
          UNIT_OUTCOME: ${{ steps.unit_tests.outcome }}
          FUNCTIONAL_OUTCOME: ${{ steps.functional_tests.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/ci_test_summary.js

      - name: 📁 Upload artefatos de teste
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: deploy-test-report-${{ github.run_number }}
          path: |
            coverage/
            junit.xml
            reports/
            playwright-report/
            test-results/
          retention-days: 30
          if-no-files-found: warn

      - name: 🚦 Resultado final dos testes
        if: always()
        run: |
          if [ "${{ steps.unit_tests.outcome }}" != "success" ] || [ "${{ steps.functional_tests.outcome }}" != "success" ]; then
            echo "❌ Deploy bloqueado: testes unitários ou funcionais falharam."
            exit 1
          fi
          echo "✅ Testes de deploy finalizados com sucesso."

  # ── Job 2: Build ──────────────────────────────────────────────────────────
  build:
    name: 🔨 Build do site
    runs-on: ubuntu-latest
    needs: test # só executa se os testes passarem
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v6

      - name: 🟢 Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm install

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 📂 Gerar catálogo de produtos
        run: python3 scripts/build_catalog.py

      - name: 🗂️ Preparar site estático
        run: |
          mkdir -p site
          cp -R index.html styles.css app.js catalog.json products logos site/

      - name: ⚙️ Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📤 Upload artefato Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: 📊 Resumo do build
        run: |
          echo "## Resultado do Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Build realizado com sucesso: 8 steps concluídos sem erros no job build." >> $GITHUB_STEP_SUMMARY
          echo "- Artefato do GitHub Pages publicado para o job de deploy." >> $GITHUB_STEP_SUMMARY

  # ── Job 3: Deploy ─────────────────────────────────────────────────────────
  deploy:
    name: 🌐 Publicar no GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 📊 Resumo do deploy
        if: always()
        run: |
          echo "## Resultado do Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.deployment.outcome }}" = "success" ]; then
            echo "- Deploy realizado com sucesso: 1 step concluído sem erros no job deploy." >> $GITHUB_STEP_SUMMARY
            echo "- URL publicada: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Deploy finalizado com falha: verifique os logs do step de publicação." >> $GITHUB_STEP_SUMMARY
          fi

  # ── Job 4: Notificação ───────────────────────────────────────────────────
  notify:
    name: 📧 Notificar resultado do deploy
    runs-on: ubuntu-latest
    needs:
      - test
      - build
      - deploy
    if: always()
    steps:
      - name: 📧 Enviar notificação por email
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          NOTIFICATION_FROM: ${{ secrets.NOTIFICATION_FROM }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          SERVER_URL: ${{ github.server_url }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          if [ -z "$SMTP_HOST" ] || [ -z "$SMTP_USERNAME" ] || [ -z "$SMTP_PASSWORD" ]; then
            echo "Notificação por email ignorada: configure SMTP_HOST, SMTP_USERNAME e SMTP_PASSWORD nos secrets do repositório."
            exit 0
          fi

          python3 - <<'PY'
          import os
          import json
          import smtplib
          import ssl
          import urllib.request
          from email.message import EmailMessage

          def resolve_recipient():
            configured = os.environ.get("NOTIFICATION_EMAIL", "").strip()
            if configured:
              return configured

            owner = os.environ["REPOSITORY_OWNER"]
            token = os.environ.get("GITHUB_TOKEN", "")
            request = urllib.request.Request(
              f"https://api.github.com/users/{owner}",
              headers={
                "Accept": "application/vnd.github+json",
                "Authorization": f"Bearer {token}",
                "X-GitHub-Api-Version": "2022-11-28",
              },
            )

            try:
              with urllib.request.urlopen(request, timeout=10) as response:
                profile = json.load(response)
            except Exception as error:
              print(f"Não foi possível consultar email público do owner {owner}: {error}")
              return ""

            return (profile.get("email") or "").strip()

          recipient = resolve_recipient()
          if not recipient:
            print(
              "Notificação por email ignorada: o email público do dono do repositório "
              "não está disponível. Configure o secret NOTIFICATION_EMAIL com o email da conta."
            )
            raise SystemExit(0)

          test_result = os.environ["TEST_RESULT"]
          build_result = os.environ["BUILD_RESULT"]
          deploy_result = os.environ["DEPLOY_RESULT"]
          passed = test_result == "success" and build_result == "success" and deploy_result == "success"
          status = "PASSOU" if passed else "FALHOU"
          icon = "✅" if passed else "❌"
          repo = os.environ["REPOSITORY"]
          run_url = f'{os.environ["SERVER_URL"]}/{repo}/actions/runs/{os.environ["RUN_ID"]}'
          commit = os.environ["COMMIT_SHA"][:7]
          page_url = os.environ.get("PAGE_URL") or "Não publicada nesta execução."

          message = EmailMessage()
          message["Subject"] = f"{icon} Deploy GitHub Pages - {status} - {repo} #{os.environ['RUN_NUMBER']}"
          message["From"] = os.environ.get("NOTIFICATION_FROM") or os.environ["SMTP_USERNAME"]
          message["To"] = recipient
          message.set_content(f"""Resultado do Deploy GitHub Pages: {status}

          Repositório: {repo}
          Execução: #{os.environ["RUN_NUMBER"]}
          Trigger: {os.environ["EVENT_NAME"]}
          Branch: {os.environ["REF_NAME"]}
          Commit: {commit}
          Testes: {test_result}
          Build: {build_result}
          Deploy: {deploy_result}
          URL publicada: {page_url}

          Relatório da execução:
          {run_url}

          Os relatórios de teste ficam disponíveis nos artefatos da pipeline.
          """)

          host = os.environ["SMTP_HOST"]
          port = int(os.environ.get("SMTP_PORT") or "587")
          username = os.environ["SMTP_USERNAME"]
          password = os.environ["SMTP_PASSWORD"]

          if port == 465:
            with smtplib.SMTP_SSL(host, port, context=ssl.create_default_context()) as smtp:
              smtp.login(username, password)
              smtp.send_message(message)
          else:
            with smtplib.SMTP(host, port) as smtp:
              smtp.starttls(context=ssl.create_default_context())
              smtp.login(username, password)
              smtp.send_message(message)
          PY
