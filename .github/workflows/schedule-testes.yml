name: 🕘 Schedule - Execução de Testes

on:
  schedule:
    - cron: "43 5 * 6 *"
    - cron: "28 12 * 6 *"
    - cron: "38 22 15 6 *"

  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  run-tests:
    name: 🧪 Executar suíte de testes (agendado)
    uses: ./.github/workflows/testes-automatizados.yml
    with:
      debug: false
    secrets: inherit

  debug:
    name: 🔍 Depuração
    runs-on: ubuntu-latest
    needs: run-tests
    if: always()
    steps:
      - name: Imprimir resultado
        run: |
          echo "Horário de execução: $(date -u)"
          echo "Resultado dos testes: ${{ needs.run-tests.result }}"

  notify:
    name: 📧 Notificar resultado
    runs-on: ubuntu-latest
    needs: run-tests
    if: always()

    steps:
      - name: Enviar e-mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}

          subject: >
            ${{ needs.run-tests.result == 'success'
                && '✅ Testes Automatizados - Sucesso'
                || '❌ Testes Automatizados - Falha' }}

          to: qa@empresa.com
          from: GitHub Actions

          html_body: |
            <h2>Resultado da execução agendada</h2>

            <p>
              <b>Status:</b>
              ${{ needs.run-tests.result }}
            </p>

            <p>
              <b>Total de testes:</b>
              ${{ needs.run-tests.outputs.total_tests }}
            </p>

            <p>
              <b>Falhas:</b>
              ${{ needs.run-tests.outputs.total_failures }}
            </p>

            <p>
              <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">
                Ver execução
              </a>
            </p>