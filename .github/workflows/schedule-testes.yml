# ──────────────────────────────────────────────────────────────────────────────
# Schedule — Execução de Testes
#
# Apenas o "cronômetro": dispara testes-automatizados.yml via workflow_call
# nos horários configurados (cron em UTC). Não duplica steps de teste.
# ──────────────────────────────────────────────────────────────────────────────

name: 🕘 Schedule - Testes Automatizados

on:
  workflow_dispatch:

  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  run-tests:
    name: 🧪 Executar suíte de testes (agendado)
    uses: ./.github/workflows/testes-automatizados.yml
    with:
      debug: false
    secrets: inherit

  debug:
    name: 🔍 Depuração
    runs-on: ubuntu-latest
    needs: run-tests
    if: always()
    steps:
      - name: Imprimir mensagem de depuração
        run: |
          echo "Workflow de teste agendado!"
          echo "Horário de execução: $(date -u)"
          echo "Resultado dos testes: ${{ needs.run-tests.result }}"