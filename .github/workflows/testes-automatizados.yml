# ──────────────────────────────────────────────────────────────────────────────
# Testes Automatizados (Funcionais / E2E) — Reutilizável
#
# Não dispara por conta própria em push/PR (isso é papel do
# ci-testes-unitarios.yml). É chamado via workflow_call por:
#   • schedule-testes.yml
#   • execucao-manual.yml
#   • deploy-pages.yml
#
# Expõe outputs com o resultado dos testes unitários e funcionais para que
# também o workflow chamador monte o e-mail de status consolidado.
# ──────────────────────────────────────────────────────────────────────────────

name: 🧪 Testes Automatizados (E2E)

on:
  workflow_call:
    inputs:
      debug:
        description: "Ativar modo verbose extra"
        required: false
        default: false
        type: boolean
    outputs:
      unit_outcome:
        description: "Resultado dos testes unitários (success/failure)"
        value: ${{ jobs.test.outputs.unit_outcome }}
      functional_outcome:
        description: "Resultado dos testes funcionais (success/failure)"
        value: ${{ jobs.test.outputs.functional_outcome }}
      overall_result:
        description: "Resultado geral (success/failure)"
        value: ${{ jobs.test.outputs.overall_result }}
      total_tests:
        description: "Total de testes executados"
        value: ${{ jobs.test.outputs.total_tests }}
      total_failures:
        description: "Total de falhas"
        value: ${{ jobs.test.outputs.total_failures }}

  workflow_dispatch:
    inputs:
      debug:
        description: "Ativar modo verbose extra"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Executar testes e gerar relatório
    runs-on: ubuntu-latest
    outputs:
      unit_outcome: ${{ steps.unit_tests.outcome }}
      functional_outcome: ${{ steps.functional_tests.outcome }}
      overall_result: ${{ steps.final_result.outputs.result }}
      total_tests: ${{ steps.metrics.outputs.total_tests }}
      total_failures: ${{ steps.metrics.outputs.total_failures }}

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 📂 Gerar catálogo de produtos
        run: npm run build:catalog

      - name: 🧪 Executar testes unitários com cobertura
        id: unit_tests
        continue-on-error: true
        run: |
          mkdir -p reports
          EXTRA=""
          if [ "${{ inputs.debug }}" = "true" ]; then EXTRA="--verbose"; fi
          npm run test:unit:ci -- --runInBand $EXTRA
        env:
          JEST_JUNIT_OUTPUT_DIR: "."
          JEST_JUNIT_OUTPUT_NAME: "junit.xml"

      - name: 📋 Publicar relatório de testes (Test Reporter)
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: "Relatório Jest"
          path: "junit.xml"
          reporter: jest-junit
          fail-on-error: false

      - name: 🎭 Instalar navegadores do Playwright
        id: playwright_install
        if: always()
        continue-on-error: true
        run: npx playwright install --with-deps chromium

      - name: 🎭 Executar testes funcionais
        id: functional_tests
        if: always()
        continue-on-error: true
        run: |
          if [ "${{ steps.playwright_install.outcome }}" != "success" ]; then
            echo "Instalação do Playwright falhou; marcando testes funcionais como falha."
            exit 1
          fi
          npm run test:functional

      - name: 📋 Publicar relatório funcional (Playwright)
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: "Relatório Playwright"
          path: "reports/functional-junit.xml"
          reporter: java-junit
          fail-on-error: false

      - name: 📊 Resumo dos totais no Step Summary
        if: always()
        env:
          UNIT_OUTCOME: ${{ steps.unit_tests.outcome }}
          FUNCTIONAL_OUTCOME: ${{ steps.functional_tests.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/ci_test_summary.js

      - name: 📊 Coletar métricas
        id: metrics
        if: always()
        run: |
          TOTAL_TESTS=$(grep -o 'tests="[0-9]*"' junit.xml | head -1 | grep -o '[0-9]*')
          TOTAL_FAILURES=$(grep -o 'failures="[0-9]*"' junit.xml | head -1 | grep -o '[0-9]*')

          echo "total_tests=${TOTAL_TESTS:-0}" >> $GITHUB_OUTPUT
          echo "total_failures=${TOTAL_FAILURES:-0}" >> $GITHUB_OUTPUT

      - name: 📁 Upload artefatos de teste
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report-${{ github.run_number }}
          path: |
            coverage/
            junit.xml
            reports/
            playwright-report/
            test-results/
          retention-days: 30
          if-no-files-found: warn

      - name: 💬 Comentar resultado no PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const unitSuccess = '${{ steps.unit_tests.outcome }}' === 'success';
            const functionalSuccess = '${{ steps.functional_tests.outcome }}' === 'success';
            const success = unitSuccess && functionalSuccess;
            const icon    = success ? '✅' : '❌';
            const status  = success ? 'PASSOU' : 'FALHOU';
            const sha     = context.sha.substring(0, 7);
            const run     = '${{ github.run_number }}';

            const body = [
              `## ${icon} Testes Automatizados — ${status}`,
              '',
              `| Campo | Valor |`,
              `|-------|-------|`,
              `| Status  | **${status}** |`,
              `| Unitários | ${unitSuccess ? 'PASSOU' : 'FALHOU'} |`,
              `| Funcionais | ${functionalSuccess ? 'PASSOU' : 'FALHOU'} |`,
              `| Commit  | \`${sha}\` |`,
              `| Execução | [#${run}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |`,
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body,
            });

      - name: 🚦 Resultado final dos testes
        id: final_result
        if: always()
        run: |
          if [ "${{ steps.unit_tests.outcome }}" != "success" ] || [ "${{ steps.functional_tests.outcome }}" != "success" ]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "❌ Uma etapa de testes falhou."
            exit 1
          fi
          echo "result=success" >> "$GITHUB_OUTPUT"
          echo "✅ Testes unitários e funcionais executados com sucesso."
