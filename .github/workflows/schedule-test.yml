name: 🕘 Schedule - Execução de Testes

permissions:
  actions: write
  contents: read

on:
  schedule:
    - cron: '43 5 * * *'
    - cron: '28 12 * * *'

  workflow_dispatch:

jobs:
  trigger-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Disparar workflow principal
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'tests.yml',
              ref: 'main',
              inputs: {
                debug: 'false'
              }
            })