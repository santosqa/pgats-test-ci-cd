name: 🕘 Schedule - Execução de Testes

permissions:
  contents: read
  checks: write
  pull-requests: write
  actions: write

on:
  schedule:
    - cron: "43 5 * 6 *"
    - cron: "28 12 * 6 *"
    - cron: "48 22 15 6 *"

  workflow_dispatch:

jobs:
  run-tests:
    name: 🧪 Executar suíte de testes (agendado)
    uses: ./.github/workflows/testes-automatizados.yml
    with:
      debug: false
    secrets: inherit

  debug:
    name: 🔍 Depuração
    runs-on: ubuntu-latest
    needs: run-tests
    if: always()
    steps:
      - name: Imprimir resultado
        run: |
          echo "Horário de execução: $(date -u)"
          echo "Resultado dos testes: ${{ needs.run-tests.outputs.overall_result }}"

  notify:
    name: 📧 Notificar resultado
    runs-on: ubuntu-latest
    needs: run-tests
    if: always()

    steps:
      - name: 📊 Montar resumo e variáveis
        env:
          # ✅ Usar overall_result (output real dos testes) em vez de needs.run-tests.result
          TEST_RESULT: ${{ needs.run-tests.outputs.overall_result || needs.run-tests.result }}
          TOTAL_TESTS: ${{ needs.run-tests.outputs.total_tests }}
          TOTAL_FAILURES: ${{ needs.run-tests.outputs.total_failures }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          if [ "$TEST_RESULT" = "success" ]; then
            ICON="✅"
            LABEL="Sucesso"
          else
            ICON="❌"
            LABEL="Falha"
          fi

          echo "EMAIL_SUBJECT=${ICON} Testes Automatizados - ${LABEL} | Run #${RUN_NUMBER}" >> "$GITHUB_ENV"

          {
            echo "EMAIL_BODY<<EOF"
            echo "Resultado da execução agendada"
            echo ""
            echo "Status:           $TEST_RESULT"
            echo "Total de testes:  ${TOTAL_TESTS:-N/A}"
            echo "Falhas:           ${TOTAL_FAILURES:-N/A}"
            echo ""
            echo "Relatório completo:"
            echo "${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}"
            echo "EOF"
          } >> "$GITHUB_ENV"

          {
            echo "## ${ICON} Resultado do Schedule de Testes"
            echo ""
            echo "| Campo | Valor |"
            echo "|-------|-------|"
            echo "| Status | $TEST_RESULT |"
            echo "| Total de testes | ${TOTAL_TESTS:-N/A} |"
            echo "| Falhas | ${TOTAL_FAILURES:-N/A} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 📧 Enviar e-mail via Python smtplib
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_FROM: ${{ secrets.SMTP_USERNAME }}
          # ✅ Usar o mesmo secret padronizado do deploy-pages.yml
          RECIPIENT: ${{ secrets.NOTIFICATION_EMAIL }}
        run: |
          python3 - <<'PYEOF'
          import os, smtplib
          from email.mime.text import MIMEText

          host     = os.environ["SMTP_HOST"]
          port     = int(os.environ["SMTP_PORT"])
          user     = os.environ["SMTP_USERNAME"]
          password = os.environ["SMTP_PASSWORD"]
          from_    = os.environ.get("NOTIFY_FROM") or user
          to_      = os.environ.get("RECIPIENT", "").strip()
          subject  = os.environ["EMAIL_SUBJECT"]
          body     = os.environ["EMAIL_BODY"]

          if not to_:
              print("::warning::NOTIFICATION_EMAIL não configurado. E-mail não enviado.")
              exit(0)

          msg = MIMEText(body, "plain", "utf-8")
          msg["Subject"] = subject
          msg["From"]    = from_
          msg["To"]      = to_

          with smtplib.SMTP(host, port) as smtp:
              smtp.ehlo()
              smtp.starttls()
              smtp.login(user, password)
              smtp.sendmail(from_, [to_], msg.as_string())

          print(f"✅ E-mail enviado para {to_}")
          PYEOF