name: 🕘 Schedule - Execução de Testes

on:
  schedule:
    - cron: '56 20 * * 0,1,3'   # Dom, Seg e Qua às 17:56 BRT (22:36 UTC)

  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  run-tests:
    name: 🧪 Executar suíte de testes (agendado)
    uses: ./.github/workflows/testes-automatizados.yml
    with:
      debug: false
    secrets: inherit

  debug:
    name: 🔍 Depuração
    runs-on: ubuntu-latest
    needs: run-tests
    if: always()
    steps:
      - name: Imprimir resultado
        run: |
          echo "Horário de execução: $(date -u)"
          echo "Resultado dos testes: ${{ needs.run-tests.result }}"