<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a66cff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#7b39ff;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#grad)"/>
  <!-- Tapete base -->
  <rect x="50" y="80" width="200" height="160" fill="#9b6bff" opacity="0.6" rx="4"/>
  <!-- Padrão geométrico -->
  <line x1="80" y1="100" x2="220" y2="100" stroke="#cabfe3" stroke-width="2" opacity="0.8"/>
  <line x1="75" y1="140" x2="225" y2="140" stroke="#cabfe3" stroke-width="2" opacity="0.6"/>
  <line x1="80" y1="180" x2="220" y2="180" stroke="#cabfe3" stroke-width="2" opacity="0.8"/>
  <line x1="75" y1="220" x2="225" y2="220" stroke="#cabfe3" stroke-width="2" opacity="0.6"/>
  <!-- Sombra -->
  <ellipse cx="150" cy="260" rx="70" ry="12" fill="#000" opacity="0.1"/>
</svg>
