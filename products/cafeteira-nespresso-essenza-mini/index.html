<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usados de Qualidade | Produto</title>
  <link rel="icon" href="../../logos/favIcon.png" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../../styles.css" />
<!-- ═══ TEMA: aplica ANTES do render para evitar flash ═══════════════════
     Fonte única: localStorage['usadosdequalidade-theme']
     Nunca altere o tema aqui — só leia. Alteração só ocorre via botão.  -->
<script>
  (function () {
    var t = localStorage.getItem('usadosdequalidade-theme');
    document.documentElement.dataset.theme =
      t !== null ? t : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  })();
</script>
</head>

<body data-page="product">
  <a class="skip-link" href="#product-detail">Pular para o conteúdo</a>
  <header class="site-header">
    <a class="brand-logo-svg" href="../../index.html" aria-label="Voltar para a home Usados de Qualidade">
      <img class="brand-logo-img" src="../../logos/logo.png" alt="Usados de Qualidade" />
      <span class="brand-slogan">A forma inteligente de conquistar mais pagando menos.</span>
    </a>
    <nav class="header-actions" aria-label="Navegação da página">
      <a class="ghost-button" href="../../index.html#catalogo">Voltar ao catálogo</a>
      <button class="theme-toggle" type="button" aria-label="Alternar tema" aria-pressed="false">
        <span class="theme-toggle__icon" aria-hidden="true">☾</span>
        <span class="theme-toggle__label">Tema</span>
      </button>
    </nav>
  </header>

  <main id="product-detail"></main>

  <footer class="site-footer"></footer>

  <script src="../../app.js" defer></script>
</body>

</html>
